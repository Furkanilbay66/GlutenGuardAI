# nixpacks.toml configuration to override default Node.js build detection
providers = ["python"]

[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-tur", "tesseract-ocr-eng"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r backend/requirements.txt"]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
